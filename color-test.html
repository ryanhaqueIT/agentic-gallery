<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Test — Pick Your Glow</title>
  <style>
    @font-face {
      font-family: "JW Serif";
      src: url("https://cdn.prod.website-files.com/6969058e00fa5f2cbbc12aa9/696909ee58e0cf8451b0fe4c_family-medium.woff2") format("woff2");
      font-weight: 500; font-style: normal; font-display: swap;
    }
    @font-face {
      font-family: "JW Sans";
      src: url("https://cdn.prod.website-files.com/6969058e00fa5f2cbbc12aa9/69690a6bb93f15276cfb093a_McQueenGrotesk-Regular.woff2") format("woff2");
      font-weight: 400; font-style: normal; font-display: swap;
    }
    @font-face {
      font-family: "JW Sans";
      src: url("https://cdn.prod.website-files.com/6969058e00fa5f2cbbc12aa9/69690a6b078f8c904abc3ce2_McQueenGrotesk-Bold.woff2") format("woff2");
      font-weight: 700; font-style: normal; font-display: swap;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "JW Sans", Arial, sans-serif;
      background: #010008;
      color: rgba(246, 243, 240, 0.88);
      overflow-x: hidden;
    }

    .switcher {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      display: flex;
      gap: 8px;
      background: rgba(246, 243, 240, 0.06);
      border: 1px solid rgba(246, 243, 240, 0.08);
      border-radius: 1440px;
      padding: 6px;
    }

    .switcher button {
      font-family: "JW Sans", Arial, sans-serif;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: rgba(246, 243, 240, 0.5);
      background: transparent;
      border: none;
      padding: 10px 18px;
      border-radius: 1440px;
      cursor: pointer;
      transition: all 0.4s ease;
    }

    .switcher button.active {
      background: rgba(246, 243, 240, 0.1);
      color: rgba(246, 243, 240, 0.95);
    }

    .switcher button:hover {
      color: rgba(246, 243, 240, 0.8);
    }

    .glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      transition: background 1.2s ease;
    }

    .preview {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 100px 40px;
      text-align: center;
    }

    .navbar-preview {
      width: 900px;
      max-width: 100%;
      height: 55px;
      border-radius: 1440px;
      background: rgba(246, 243, 240, 0.04);
      border: 1px solid rgba(246, 243, 240, 0.04);
      padding: 16px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 80px;
    }

    .nav-logo { font-size: 15px; font-weight: 700; }

    .nav-links {
      display: flex;
      gap: 8px;
    }

    .nav-links span {
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: rgba(246, 243, 240, 0.4);
      padding: 8px 12px;
      border-radius: 32px;
    }

    h1 {
      font-family: "JW Serif", Georgia, serif;
      font-size: 72px;
      font-weight: 500;
      line-height: 76px;
      margin-bottom: 60px;
    }

    .cards-row {
      display: flex;
      gap: 32px;
      margin-bottom: 60px;
    }

    .card-preview {
      width: 280px;
      border-radius: 6px;
      overflow: hidden;
    }

    .card-img {
      width: 100%;
      aspect-ratio: 4/5;
      border-radius: 6px;
    }

    .card-text {
      padding: 12px 0;
      text-align: left;
    }

    .card-title {
      font-size: 15px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.3px;
      margin-bottom: 4px;
    }

    .card-desc {
      font-size: 14px;
      color: rgba(246, 243, 240, 0.32);
      letter-spacing: 0.4px;
    }

    .card-label {
      display: inline-flex;
      background: rgba(246, 243, 240, 0.04);
      border: 1px solid rgba(246, 243, 240, 0.04);
      border-radius: 2px;
      padding: 4px 8px;
      margin-top: 6px;
    }

    .card-label span {
      font-size: 10px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(246, 243, 240, 0.64);
    }

    .palette-info {
      margin-top: 40px;
      padding: 24px 32px;
      background: rgba(246, 243, 240, 0.04);
      border: 1px solid rgba(246, 243, 240, 0.04);
      border-radius: 6px;
      max-width: 600px;
      text-align: left;
    }

    .palette-name {
      font-family: "JW Serif", Georgia, serif;
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .palette-desc {
      font-size: 14px;
      color: rgba(246, 243, 240, 0.48);
      line-height: 22px;
    }

    .swatches {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    .swatch {
      width: 40px;
      height: 40px;
      border-radius: 6px;
      border: 1px solid rgba(246, 243, 240, 0.1);
    }

    .swatch-label {
      font-size: 10px;
      letter-spacing: 1px;
      color: rgba(246, 243, 240, 0.32);
      text-align: center;
      margin-top: 4px;
    }

    @media (max-width: 768px) {
      h1 { font-size: 40px; line-height: 44px; }
      .cards-row { flex-direction: column; align-items: center; }
      .switcher { flex-wrap: wrap; justify-content: center; max-width: 90%; }
    }
  </style>
</head>
<body>

  <div class="switcher">
    <button class="active" onclick="setTheme('current')">Current</button>
    <button onclick="setTheme('agentic')">A: Agentic Glow</button>
    <button onclick="setTheme('neural')">B: Neural Blue</button>
    <button onclick="setTheme('human')">C: Human Agent</button>
  </div>

  <div class="glow" id="glow"></div>

  <div class="preview">
    <div class="navbar-preview">
      <span class="nav-logo">Ryan Haque</span>
      <div class="nav-links">
        <span>Works</span>
        <span>Notes</span>
        <span>About</span>
        <span>Contact</span>
      </div>
    </div>

    <h1>A living agentic gallery.</h1>

    <div class="cards-row">
      <div class="card-preview">
        <div class="card-img" style="background: linear-gradient(145deg, #1a0a1e 0%, #c45a7b 45%, #f5c6d0 100%);"></div>
        <div class="card-text">
          <div class="card-title">Wedding OS (Emma)</div>
          <div class="card-desc">AI studio manager for wedding vendors.</div>
          <div class="card-label"><span>Client</span></div>
        </div>
      </div>
      <div class="card-preview">
        <div class="card-img" style="background: linear-gradient(145deg, #1a0e05 0%, #b8860b 45%, #daa520 100%);"></div>
        <div class="card-text">
          <div class="card-title">Sigma Construction</div>
          <div class="card-desc">AI-powered construction platform.</div>
          <div class="card-label"><span>Client</span></div>
        </div>
      </div>
      <div class="card-preview">
        <div class="card-img" style="background: linear-gradient(145deg, #020c1b 0%, #0420f2 45%, #4a6cf7 100%);"></div>
        <div class="card-text">
          <div class="card-title">Harness Engineering</div>
          <div class="card-desc">22-gate validation for AI agents.</div>
          <div class="card-label"><span>Open Source</span></div>
        </div>
      </div>
    </div>

    <div class="palette-info" id="paletteInfo"></div>
  </div>

  <script>
    const themes = {
      current: {
        name: "Current (Jack Watkins Original)",
        desc: "Blue + purple + magenta. Artistic, creative, dramatic. Inherited from the original art portfolio.",
        swatches: ["#0420f2", "#6400dc", "#b40078", "#8c0028", "#500014"],
        glow: `
          radial-gradient(ellipse 60% 50% at 85% 5%, rgba(4, 32, 242, 0.5), transparent),
          radial-gradient(ellipse 50% 50% at 70% 30%, rgba(100, 0, 220, 0.35), transparent),
          radial-gradient(ellipse 60% 40% at 55% 55%, rgba(180, 0, 120, 0.3), transparent),
          radial-gradient(ellipse 40% 40% at 40% 75%, rgba(140, 0, 40, 0.25), transparent),
          radial-gradient(ellipse 30% 30% at 20% 85%, rgba(80, 0, 30, 0.2), transparent)
        `
      },
      agentic: {
        name: "Option A: Agentic Glow",
        desc: "Teal + violet + mint. The 2026 AI brand trend. Signals active, living intelligence. Trust meets innovation.",
        swatches: ["#008080", "#706FD3", "#00FFC2", "#1A4A5C", "#0D2B3E"],
        glow: `
          radial-gradient(ellipse 60% 50% at 80% 8%, rgba(0, 128, 128, 0.5), transparent),
          radial-gradient(ellipse 50% 50% at 65% 35%, rgba(112, 111, 211, 0.4), transparent),
          radial-gradient(ellipse 55% 40% at 45% 60%, rgba(0, 255, 194, 0.15), transparent),
          radial-gradient(ellipse 40% 40% at 30% 80%, rgba(0, 100, 100, 0.25), transparent),
          radial-gradient(ellipse 35% 35% at 85% 75%, rgba(112, 111, 211, 0.2), transparent)
        `
      },
      neural: {
        name: "Option B: Neural Blue",
        desc: "Electric indigo + cyan + deep navy. Bold, technical, data-forward. For ML platforms and deep-tech.",
        swatches: ["#6F00FF", "#00FFFF", "#00075D", "#3E3D53", "#4a6cf7"],
        glow: `
          radial-gradient(ellipse 55% 50% at 80% 10%, rgba(111, 0, 255, 0.5), transparent),
          radial-gradient(ellipse 50% 45% at 60% 40%, rgba(0, 255, 255, 0.2), transparent),
          radial-gradient(ellipse 60% 45% at 50% 60%, rgba(111, 0, 255, 0.25), transparent),
          radial-gradient(ellipse 40% 40% at 30% 80%, rgba(0, 7, 93, 0.4), transparent),
          radial-gradient(ellipse 35% 30% at 90% 70%, rgba(0, 255, 255, 0.12), transparent)
        `
      },
      human: {
        name: "Option C: Human Agent",
        desc: "Blue + terra cotta + soft violet. Bridges tech and humanity. Nods to Anthropic/Claude. Says 'I build AI for real people.'",
        swatches: ["#0420f2", "#da7756", "#706FD3", "#8b4513", "#1a3a5c"],
        glow: `
          radial-gradient(ellipse 55% 50% at 82% 8%, rgba(4, 32, 242, 0.45), transparent),
          radial-gradient(ellipse 50% 45% at 65% 35%, rgba(112, 111, 211, 0.3), transparent),
          radial-gradient(ellipse 55% 45% at 40% 60%, rgba(218, 119, 86, 0.3), transparent),
          radial-gradient(ellipse 45% 40% at 25% 80%, rgba(139, 69, 19, 0.25), transparent),
          radial-gradient(ellipse 35% 30% at 80% 75%, rgba(218, 119, 86, 0.15), transparent)
        `
      }
    };

    function setTheme(key) {
      const t = themes[key];
      document.getElementById("glow").style.background = t.glow;

      // Update active button
      document.querySelectorAll(".switcher button").forEach(b => b.classList.remove("active"));
      event.target.classList.add("active");

      // Update palette info
      let swatchHtml = t.swatches.map(c =>
        `<div><div class="swatch" style="background:${c};"></div><div class="swatch-label">${c}</div></div>`
      ).join("");

      document.getElementById("paletteInfo").innerHTML = `
        <div class="palette-name">${t.name}</div>
        <div class="palette-desc">${t.desc}</div>
        <div class="swatches">${swatchHtml}</div>
      `;
    }

    // Init with current
    setTheme("current");
  </script>
</body>
</html>
